name: Create v4.0.1 Release
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/create-release.yml'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        uses: actions/github-script@v7
        with:
          script: |
            const releaseBody = [
              "## nyuchi design portal v4.0.1",
              "",
              "The canonical design system for the bundu ecosystem.",
              "",
              "### What's in this release",
              "",
              "- **DB-first architecture** \u2014 all registry data served from Supabase; zero hardcoded fallbacks",
              "- **294+ registry items** \u2014 169 UI components, 70 chart blocks, 35 page blocks, 3 hooks, 11 lib utilities",
              "- **MCP server** at `/mcp` \u2014 12 tools for Claude Code and MCP-compatible AI assistants",
              "- **AI safety layer** \u2014 input validation, circuit breaker, hallucination detection, Ubuntu cultural layer (sanitize-html for output sanitization, CodeQL clean)",
              "- **Live observability** at `/observability` \u2014 public API and MCP usage metrics (CC BY 4.0)",
              "- **Live DB counts** \u2014 landing page component counts are live from the database, not hardcoded",
              "- **Usage metrics tracking** \u2014 `usage_events` table tracks API calls and MCP tool invocations",
              "- **Five African Minerals** design system \u2014 Cobalt, Tanzanite, Malachite, Gold, Terracotta",
              "- **Ubuntu philosophy** as a first-class design layer \u2014 community-first, dignity-centred, African-context-aware",
              "- **Pre-commit gates** \u2014 lint (zero warnings), prettier, typecheck, security audit",
              "- **0 vulnerabilities** \u2014 all 21 dependency vulnerabilities resolved",
              "",
              "### Install a component",
              "",
              "```bash",
              "npx shadcn@latest add https://design.nyuchi.com/api/v1/ui/button",
              "```",
              "",
              "### Connect Claude Code",
              "",
              "```json",
              '{',
              '  "mcpServers": {',
              '    "design-portal": {',
              '      "type": "url",',
              '      "url": "https://design.nyuchi.com/mcp"',
              '    }',
              '  }',
              '}',
              "```",
              "",
              "---",
              "",
              "*Ndiri nekuti tiri \u2014 I am because we are.*",
              "",
              "Report any issues in the project's GitHub Issues. See the full changelog in CHANGELOG.md."
            ].join("\n");

            try {
              const release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: "v4.0.1",
                name: "v4.0.1",
                body: releaseBody,
                draft: false,
                prerelease: false,
                make_latest: "true",
                target_commitish: "main",
              });
              console.log("Release created: " + release.data.html_url);
            } catch (error) {
              if (error.status === 422) {
                console.log("Release v4.0.1 already exists");
              } else {
                console.error("Error: " + error.status + " - " + error.message);
                throw error;
              }
            }
